<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 600">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%; height:100%; margin:0; padding:0; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); font-family: 'Inter', Arial, Helvetica, sans-serif; display: flex; justify-content: center; align-items: center; flex-direction: column; overflow: auto;">
      
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
        
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        
        .form-container {
          position: relative;
          z-index: 1;
          text-align: center;
          padding: 40px;
          background: rgba(15, 23, 42, 0.8);
          backdrop-filter: blur(20px);
          border-radius: 24px;
          border: 1px solid rgba(59, 130, 246, 0.3);
          box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        h2 {
          margin-bottom: 10px;
          text-align: center;
          font-size: 32px;
          font-weight: 700;
          background: linear-gradient(135deg, #fff 0%, #93c5fd 100%);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
          letter-spacing: -0.5px;
        }
        
        h4 {
          margin: 20px 0 5px 0;
          font-size: 16px;
          font-weight: 500;
          color: #cbd5e1;
          text-align: left;
          width: 280px;
        }
        
        h4:first-of-type {
          margin-top: 10px;
        }
        
        input {
          width: 280px;
          padding: 12px 16px;
          margin: 5px 0;
          border: 1px solid #334155;
          border-radius: 12px;
          background: rgba(30, 41, 59, 0.8);
          backdrop-filter: blur(10px);
          color: white;
          font-size: 14px;
          font-family: 'Inter', monospace;
          outline: none;
          transition: all 0.3s ease;
          box-sizing: border-box;
        }
        
        input:hover {
          background: rgba(51, 65, 85, 0.9);
          border-color: #475569;
        }
        
        input:focus {
          background: #1e293b;
          border-color: #3b82f6;
          box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
          transform: translateY(-1px);
        }
        
        button {
          width: 280px;
          padding: 12px 20px;
          margin-top: 25px;
          border: none;
          border-radius: 12px;
          background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
          color: white;
          font-size: 16px;
          font-weight: 600;
          font-family: 'Inter', Arial, Helvetica, sans-serif;
          cursor: pointer;
          transition: all 0.3s ease;
          position: relative;
          overflow: hidden;
          box-sizing: border-box;
        }
        
        button::before {
          content: '';
          position: absolute;
          top: 50%;
          left: 50%;
          width: 0;
          height: 0;
          border-radius: 50%;
          background: rgba(255,255,255,0.3);
          transform: translate(-50%, -50%);
          transition: width 0.6s, height 0.6s;
        }
        
        button:hover::before {
          width: 300px;
          height: 300px;
        }
        
        button:hover {
          background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
          transform: translateY(-2px);
          box-shadow: 0 10px 25px -5px rgba(59,130,246,0.4);
        }
        
        button:active {
          transform: translateY(1px);
        }
        
        input::placeholder {
          color: #64748b;
          font-size: 13px;
        }
      </style>
      
      <div class="form-container">
        <h2>Enter Pass Token</h2>
        <h4>Username (enter a new one if you dont have one)</h4>
        <input type="text" id="user" placeholder="Enter your username..."/>
        <h4>Token</h4>
        <input type="password" id="token" placeholder="Enter your GitHub token..."/>
        <button id="click">Click To Login</button>
      </div>
      
      <script type="text/javascript">
        <![CDATA[
          async function go() {
            const user = document.getElementById('user').value;
            const token = document.getElementById('token').value;
            const starting = 'github_pat_';
            
            localStorage.setItem('Username', user);
            
            const url = "https://raw.githubusercontent.com/mumbojum2/rawgithubhtml/refs/heads/main/index.html";
            try {
              const res = await fetch(url, {
                headers: {
                  "Authorization": "token " + starting + token
                }
              });
              
              const html = await res.text();
              document.open();
              document.write(html);
              document.close();
            } catch (err) {
              console.log('error fetching');
              document.body.innerHTML = 'Error Fetching Try Again Soon';
            }
          }
          
          document.getElementById('click').addEventListener('click', go);
        ]]>
      </script>
    </div>
  </foreignObject>
</svg>
